<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Sofia 🔒</title>
  <meta name="description" content="Chat privado e seguro">
  <meta name="robots" content="noindex, nofollow">

  <link rel="icon" type="image/png" href="media/favicon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="preload" as="image" href="media/perfil_typer.webp">

  <style>
    :root {
      --color-bg: #0d0d0d;
      --color-header: #1a1a1a;
      --color-bubble-in: #1e1e1e;
      --color-bubble-out: #3d1a2c;
      --color-text: #f0f0f0;
      --color-text-muted: #888;
      --color-primary: #ec4899;
      --color-primary-dark: #be185d;
      --color-primary-glow: rgba(236, 72, 153, 0.25);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #080808;
      height: 100dvh;
      width: 100vw;
      display: flex;
      justify-content: center;
      overflow: hidden;
    }

    .app-container {
      width: 100%;
      max-width: 500px;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      background: var(--color-bg);
      position: relative;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }

    @media (min-width: 501px) {
      .app-container {
        height: min(860px, 96dvh);
        align-self: center;
        border-radius: 18px;
        box-shadow: 0 25px 80px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(236, 72, 153, 0.12);
      }
    }

    /* ── Header ── */
    .header {
      background: var(--color-header);
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 10;
      box-shadow: 0 1px 0 rgba(236, 72, 153, 0.15);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .back-btn {
      color: var(--color-primary);
      font-size: 22px;
      cursor: pointer;
    }

    .avatar-box {
      position: relative;
      width: 42px;
      height: 42px;
      flex-shrink: 0;
    }

    .avatar-img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      background: #2a1020;
      border: 2px solid var(--color-primary);
    }

    .online-badge {
      width: 12px;
      height: 12px;
      background: #22c55e;
      border-radius: 50%;
      border: 2px solid var(--color-header);
      position: absolute;
      bottom: 0;
      right: 0;
      animation: pulse-green 2s infinite;
    }

    .info-box {
      flex: 1;
      min-width: 0;
    }

    .name {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      display: block;
    }

    .status {
      font-size: 12px;
      color: #22c55e;
      display: block;
      font-weight: 500;
    }

    .header-actions {
      display: flex;
      gap: 18px;
      color: var(--color-text-muted);
    }

    /* ── Chat Window ── */
    .chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 14px 14px 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      background-color: var(--color-bg);
      background-image:
        radial-gradient(ellipse at top left, rgba(236, 72, 153, 0.04) 0%, transparent 60%),
        radial-gradient(ellipse at bottom right, rgba(236, 72, 153, 0.06) 0%, transparent 50%);
      scroll-behavior: smooth;
    }

    .chat-window::-webkit-scrollbar {
      width: 0;
    }

    .date-label {
      align-self: center;
      background: rgba(255, 255, 255, 0.06);
      color: var(--color-text-muted);
      padding: 4px 14px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin: 8px 0 14px;
    }

    /* ── Bolhas ── */
    .row {
      display: flex;
      flex-direction: column;
      max-width: 83%;
      opacity: 0;
      transform: translateY(12px);
      transition: all 0.3s cubic-bezier(0.1, 0.9, 0.2, 1);
    }

    .row.show {
      opacity: 1;
      transform: translateY(0);
    }

    .row.left {
      align-self: flex-start;
    }

    .row.right {
      align-self: flex-end;
    }

    .bubble {
      padding: 8px 12px 10px;
      font-size: 15px;
      line-height: 1.5;
      color: var(--color-text);
      position: relative;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
    }

    .left .bubble {
      background: var(--color-bubble-in);
      border-radius: 0 14px 14px 14px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .right .bubble {
      background: var(--color-bubble-out);
      border-radius: 14px 0 14px 14px;
      align-self: flex-end;
      border: 1px solid rgba(236, 72, 153, 0.2);
    }

    .time {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.3);
      float: right;
      margin: 5px 0 -2px 10px;
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .right .time .ticks {
      color: var(--color-primary);
    }

    /* ── Video Bubble ── */
    .video-bubble {
      max-width: 270px;
      border-radius: 16px;
      overflow: hidden;
      position: relative;
      background: #000;
      border: 2px solid rgba(236, 72, 153, 0.3);
      box-shadow: 0 4px 24px rgba(236, 72, 153, 0.2);
      margin-bottom: 4px;
    }

    .video-bubble video {
      width: 100%;
      display: block;
      border-radius: 14px;
    }

    .video-time {
      position: absolute;
      bottom: 8px;
      right: 10px;
      font-size: 10px;
      color: rgba(255, 255, 255, 0.75);
      background: rgba(0, 0, 0, 0.45);
      padding: 2px 6px;
      border-radius: 6px;
      backdrop-filter: blur(4px);
    }

    /* ── Imagem de Prova Social ── */
    .social-proof-wrap {
      max-width: 260px;
      border-radius: 14px;
      overflow: hidden;
      position: relative;
      border: 2px solid rgba(236, 72, 153, 0.3);
      box-shadow: 0 4px 20px rgba(236, 72, 153, 0.15);
      margin-bottom: 4px;
      transform: translateY(8px);
      opacity: 0;
      transition: all 0.5s ease;
    }

    .social-proof-wrap.reveal {
      transform: translateY(0);
      opacity: 1;
    }

    .social-proof-wrap img {
      width: 100%;
      display: block;
    }

    /* ── Typing ── */
    .typing-pill {
      align-self: flex-start;
      background: var(--color-bubble-in);
      padding: 11px 16px;
      border-radius: 0 14px 14px 14px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      display: none;
      margin-bottom: 6px;
    }

    .typing-pill .dot {
      width: 6px;
      height: 6px;
      background: var(--color-primary);
      border-radius: 50%;
      display: inline-block;
      animation: dots 1.4s infinite ease-in-out;
      margin: 0 2px;
      opacity: 0.6;
    }

    @keyframes dots {

      0%,
      80%,
      100% {
        transform: scale(0.6);
        opacity: 0.3;
      }

      40% {
        transform: scale(1);
        opacity: 1;
      }
    }

    /* ── Botões ── */
    .actions {
      padding: 12px 14px 16px;
      background: var(--color-header);
      display: flex;
      flex-direction: column;
      gap: 10px;
      border-top: 1px solid rgba(236, 72, 153, 0.12);
    }

    .actions.hidden {
      display: none;
    }

    .action-btn {
      width: 100%;
      height: 52px;
      border-radius: 28px;
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.18s, box-shadow 0.18s;
      text-decoration: none;
      gap: 8px;
    }

    .action-btn:active {
      transform: scale(0.96);
    }

    .btn-main {
      background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark));
      color: #fff;
      box-shadow: 0 4px 18px var(--color-primary-glow);
    }

    .btn-alt {
      background: rgba(255, 255, 255, 0.06);
      color: var(--color-text-muted);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .btn-green {
      background: linear-gradient(135deg, #22c55e, #15803d);
      color: #fff;
      box-shadow: 0 4px 18px rgba(34, 197, 94, 0.3);
    }

    @keyframes pulse-green {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.5);
      }

      50% {
        box-shadow: 0 0 0 4px rgba(34, 197, 94, 0);
      }
    }

    strong {
      font-weight: 700;
      color: #ec4899;
    }

    /* ── Foto de Apresentação ── */
    .intro-photo-wrap {
      max-width: 240px;
      border-radius: 18px;
      overflow: hidden;
      position: relative;
      border: 2px solid rgba(236, 72, 153, 0.35);
      box-shadow: 0 6px 28px rgba(236, 72, 153, 0.22);
      margin-bottom: 4px;
      transform: scale(0.92);
      opacity: 0;
      transition: transform 0.55s cubic-bezier(0.2, 0.9, 0.3, 1), opacity 0.45s ease;
    }

    .intro-photo-wrap.reveal {
      transform: scale(1);
      opacity: 1;
    }

    .intro-photo-wrap img {
      width: 100%;
      display: block;
      aspect-ratio: 4/5;
      object-fit: cover;
    }

    .intro-photo-time {
      position: absolute;
      bottom: 8px;
      right: 10px;
      font-size: 10px;
      color: rgba(255, 255, 255, 0.85);
      background: rgba(0, 0, 0, 0.45);
      padding: 2px 6px;
      border-radius: 6px;
      backdrop-filter: blur(4px);
    }
  </style>
</head>

<body>
  <div class="app-container">

    <!-- ── Header ── -->
    <div class="header">
      <div class="back-btn">&#8592;</div>
      <div class="avatar-box">
        <img src="media/perfil_typer.webp" class="avatar-img" alt="Sofia">
        <div class="online-badge"></div>
      </div>
      <div class="info-box">
        <span class="name">Sofia 🔒</span>
        <span class="status">online agora</span>
      </div>
      <div class="header-actions">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
          <path
            d="M18.921 15.381l-1.058 4.053c-.127.485-.544.821-1.051.821-3.52 0-6.867-1.403-9.432-3.951-2.548-2.547-3.951-5.912-3.951-9.432 0-.507.336-.924.842-1.051l4.053-1.058c.456-.114.933.123 1.156.557l2.027 4.148c.189.347.113.757-.185 1.011l-2.023 2.023c1.486 3.012 3.824 5.281 6.836 6.767l2.011-2.011c.254-.298.664-.401 1.011-.185l4.148 2.027c.434.223.671.7.557 1.156z" />
        </svg>
        <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
          <path d="M12 7a2 2 0 100-4 2 2 0 000 4zm0 7a2 2 0 100-4 2 2 0 000 4zm0 7a2 2 0 100-4 2 2 0 000 4z" />
        </svg>
      </div>
    </div>

    <!-- ── Chat Area ── -->
    <div class="chat-window" id="chat">
      <div class="date-label">HOJE</div>
      <div class="typing-pill" id="typing">
        <span class="dot"></span>
        <span class="dot" style="animation-delay:.2s"></span>
        <span class="dot" style="animation-delay:.4s"></span>
      </div>
    </div>

    <!-- ── Botões ── -->
    <div class="actions hidden" id="btns"></div>

  </div>

  <script>
    const chat = document.getElementById('chat');
    const typing = document.getElementById('typing');
    const btns = document.getElementById('btns');

    const wait = ms => new Promise(r => setTimeout(r, ms));

    function getTime() {
      const n = new Date();
      return n.getHours().toString().padStart(2, '0') + ':' + n.getMinutes().toString().padStart(2, '0');
    }

    function scroll() {
      chat.scrollTo({ top: chat.scrollHeight, behavior: 'smooth' });
    }

    async function showTyping(ms) {
      typing.style.display = 'block';
      scroll();
      await wait(ms);
      typing.style.display = 'none';
    }

    function addMsg(text, right = false) {
      const row = document.createElement('div');
      row.className = `row ${right ? 'right' : 'left'}`;
      const bub = document.createElement('div');
      bub.className = 'bubble';
      const ticks = right ? ' <span class="ticks">✓✓</span>' : '';
      bub.innerHTML = `${text} <span class="time">${getTime()}${ticks}</span>`;
      row.appendChild(bub);
      chat.insertBefore(row, typing);
      setTimeout(() => { row.classList.add('show'); scroll(); }, 40);
    }

    /* ── Vídeo autoplay como bolha de chat ── */
    function addVideo(src) {
      const row = document.createElement('div');
      row.className = 'row left';

      const wrap = document.createElement('div');
      wrap.className = 'video-bubble';

      wrap.innerHTML = `
        <video
          src="${src}"
          autoplay
          muted
          playsinline
          loop
          preload="auto"
        ></video>
        <div class="video-time">${getTime()}</div>
      `;

      row.appendChild(wrap);
      chat.insertBefore(row, typing);

      const vid = wrap.querySelector('video');
      
      // Scroll quando o vídeo carregar as dimensões ou começar a tocar
      vid.addEventListener('loadedmetadata', scroll);
      vid.addEventListener('play', () => setTimeout(scroll, 100));

      setTimeout(() => {
        row.classList.add('show');
        scroll();
        vid.play().catch(() => { });
      }, 40);

      // Garantia extra de scroll após o vídeo ser renderizado
      setTimeout(scroll, 600);
    }

    /* ── Foto de apresentação da Sofia ── */
    function addIntroPhoto(src) {
      const row = document.createElement('div');
      row.className = 'row left';

      const wrap = document.createElement('div');
      wrap.className = 'intro-photo-wrap';
      wrap.innerHTML = `
        <img src="${src}" alt="Sofia" loading="eager">
        <div class="intro-photo-time">${getTime()}</div>
      `;

      row.appendChild(wrap);
      chat.insertBefore(row, typing);

      setTimeout(() => {
        row.classList.add('show');
        // pequeno delay extra pra transição ser vista
        setTimeout(() => { wrap.classList.add('reveal'); scroll(); }, 80);
      }, 40);
    }

    /* ── Foto de prova social ── */
    function addSocialProofPhoto(src) {
      const row = document.createElement('div');
      row.className = 'row left';

      const wrap = document.createElement('div');
      wrap.className = 'social-proof-wrap';
      wrap.innerHTML = `
        <img src="${src}" alt="Prova Social" loading="lazy">
        <div class="video-time">${getTime()}</div>
      `;

      row.appendChild(wrap);
      chat.insertBefore(row, typing);

      setTimeout(() => {
        row.classList.add('show');
        setTimeout(() => { wrap.classList.add('reveal'); scroll(); }, 100);
      }, 40);
    }

    function showButtons(list) {
      btns.innerHTML = '';
      if (!list || !list.length) { btns.classList.add('hidden'); return; }
      list.forEach(item => {
        if (item.type === 'link') {
          const a = document.createElement('a');
          a.href = item.url;
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
          a.className = `action-btn ${item.cls || 'btn-main'}`;
          a.innerHTML = item.label;
          btns.appendChild(a);
        } else {
          const b = document.createElement('button');
          b.className = `action-btn ${item.cls || 'btn-main'}`;
          b.innerHTML = item.label;
          b.onclick = () => {
            addMsg(item.label, true);
            showButtons([]);
            item.fn();
          };
          btns.appendChild(b);
        }
      });
      btns.classList.remove('hidden');
      scroll();
    }

    /* ════════════════════════════════════════
       FUNIL SOFIA — SUBWAY SURF iGAMING
    ════════════════════════════════════════ */

    async function run() {

      /* ── ABERTURA — Sofia se apresenta ── */
      await wait(500);
      await showTyping(700);
      addMsg("oi!! tudo bem? 🥰");

      await wait(1400);
      await showTyping(900);
      addMsg("me chamo Sofia, tenho 23 anos...");

      /* ── Foto de apresentação ── */
      await wait(1000);
      addIntroPhoto("media/previas 01.jpeg");

      await wait(1800);
      await showTyping(1100);
      addMsg("tô passando aqui porque tenho algo MUITO bom pra te mostrar 👀");

      await wait(1800);
      await showTyping(1200);
      addMsg("antes de te mostrar, deixa eu te perguntar umas coisinhas rápidas 😄");

      await wait(1000);
      showButtons([
        { label: "claro, pode perguntar! 😊", fn: pergunta1 },
        { label: "me mostra logo 👀", cls: "btn-alt", fn: pergunta1 }
      ]);
    }

    /* ══════════ PERGUNTA 1 — Subway Surf + Vídeo ══════════ */
    async function pergunta1() {
      await wait(700);
      await showTyping(1000);
      addMsg("você já jogou Subway Surf? 🚇");

      /* Vídeo aparece logo depois da pergunta, automático */
      await wait(800);
      addVideo("media/video_subway_sulf.mp4");

      await wait(1200);
      showButtons([
        { label: "😍 sim, adoro esse jogo!", fn: q1Sim },
        { label: "🤷 já joguei mas faz tempo", fn: q1Feztempo },
        { label: "❌ nunca joguei", fn: q1Nao }
      ]);
    }

    async function q1Sim() {

    async function pergunta2() {

    async function q2Nao() {

      await wait(1600);

    async function q2Sim() {
      await wait(700);
      await showTyping(900);
      addMsg("perfeito! 💛 boa pra você...");
      await wait(1400);
      await pergunta3();
    }

    /* ══════════ PERGUNTA 3 — Renda extra ══════════ */
    async function pergunta3() {
      await wait(600);
      await showTyping(1300);
      addMsg("você toparia jogar um jogo divertido com a chance de ganhar uma graninha extra no pix? 💸");

      await wait(900);
      showButtons([
        { label: "💸 sim, com certeza!", fn: q3Sim },
        { label: "🤔 depende, me conta mais", fn: q3Talvez }
      ]);
    }

    async function q3Talvez() {

      await showTyping(1000);
      addMsg("claro! vou te mostrar tudo, sem enrolação e sem promessa fake 😊");
      await wait(1400);

    /* ══════════ BLOCO DO PIX ══════════ */
    async function q3Sim() {
      await wait(800);
      await showTyping(1000);
      addMsg("Boa!! 🥰");

      await wait(1200);
      await showTyping(1000);
      addMsg("Dá uma olhada no que eu e a galera estamos faturando no Subway Surf 👇");

      addSocialProofPhoto("media/vendas online em 24 horas.jpg");

      await showTyping(1100);
      addMsg("Dá pra lucrar muito jogando só pelo celular 📲");

      await wait(1500);
      await showTyping(1200);
      addMsg("É um jogo real: diversão com risco, mas a plataforma paga de verdade quando você ganha.");

      await wait(1500);
      await showTyping(1000);
      addMsg("Saque rápido via PIX e plataforma 100% segura. Bora testar? 👇");

      await wait(800);
      showButtons([
        { label: "🚇 sim, quero jogar agora!", fn: flowSim },
        { label: "🤔 ainda tenho dúvidas...", cls: "btn-alt", fn: flowDuvida }
      ]);
    }

    /* ══════════ CTA FINAL ══════════ */
    async function flowSim() {
      await wait(700);
      await showTyping(1000);
      addMsg("aiii 😍 sabia que você era da minha turma!");

      await wait(1500);
      await showTyping(1200);
      addMsg("clica no botão abaixo e já entra na plataforma agora 🔥");

      await wait(1400);
      await showTyping(900);
      addMsg("é gratuito pra criar a conta — o bônus de entrada também tá ativo 💛");

      await wait(1000);
      showButtons([
        {
          type: 'link',
          cls: 'btn-green',
          label: '🚇 Acessar a plataforma agora',
          url: 'https://subwaysurfsoriginal.com/?ref=HHYFDDDYU'
        }
      ]);
